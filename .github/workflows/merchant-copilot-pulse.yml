name: Merchant Copilot Pulse

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: merchant-copilot-pulse
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check secrets
        env:
          FNB_PULSE_BASE_URL: ${{ secrets.FNB_PULSE_BASE_URL }}
          FNB_INTERNAL_API_TOKEN: ${{ secrets.FNB_INTERNAL_API_TOKEN }}
        run: |
          if [ -z "$FNB_PULSE_BASE_URL" ] || [ -z "$FNB_INTERNAL_API_TOKEN" ]; then
            echo "Skipping: FNB_PULSE_BASE_URL or FNB_INTERNAL_API_TOKEN is not configured."
            exit 0
          fi

      - name: Trigger merchant copilot pulse
        env:
          FNB_PULSE_BASE_URL: ${{ secrets.FNB_PULSE_BASE_URL }}
          FNB_INTERNAL_API_TOKEN: ${{ secrets.FNB_INTERNAL_API_TOKEN }}
        run: |
          set -euo pipefail
          endpoint="${FNB_PULSE_BASE_URL%/}/api/fnb/ops"
          payload='{"action":"merchant-copilot-complete-next"}'
          response_file="$(mktemp)"
          http_code="$(
            curl -sS \
              -o "$response_file" \
              -w '%{http_code}' \
              -X POST "$endpoint" \
              -H 'content-type: application/json' \
              -H "x-fnb-admin-token: ${FNB_INTERNAL_API_TOKEN}" \
              --data "$payload"
          )"

          cat "$response_file"
          echo
          echo "HTTP ${http_code}"

          if [ "$http_code" -ge 400 ]; then
            echo "Merchant Copilot pulse failed."
            exit 1
          fi
